<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>smart-table tests</title>
<style>
    body { font-family: ui-monospace, Menlo, monospace; margin: 1.5rem; background: #0d1117; color: #e6edf3; }
    h1 { font-size: 1.1rem; }
    .case { padding: 0.35rem 0.6rem; margin: 0.2rem 0; border-radius: 4px; }
    .pass { background: rgba(16, 185, 129, 0.15); border-left: 3px solid #10b981; }
    .fail { background: rgba(239, 68, 68, 0.18); border-left: 3px solid #ef4444; white-space: pre-wrap; }
    .summary { margin-top: 1rem; font-weight: 600; }
</style>
</head>
<body>
<h1>smart-table.js — pure function tests</h1>
<div id="results"></div>
<div class="summary" id="summary"></div>

<script src="../js/utils.js"></script>
<script src="../js/components/smart-table.js"></script>
<script>
// Minimal test harness — no deps. Each `test(name, fn)` runs fn and records
// pass/fail. `assertEq(actual, expected, label)` and `assert(cond, label)`.
const results = [];
function test(name, fn) {
    try {
        fn();
        results.push({ name, ok: true });
    } catch (e) {
        results.push({ name, ok: false, err: e.message || String(e) });
    }
}
function assert(cond, label) {
    if (!cond) throw new Error(`assert failed: ${label}`);
}
function assertEq(actual, expected, label) {
    const a = JSON.stringify(actual);
    const e = JSON.stringify(expected);
    if (a !== e) throw new Error(`${label}\n  actual:   ${a}\n  expected: ${e}`);
}

// ── _interpolate ─────────────────────────────────────────────────────
test('_interpolate: {row.key} substitutes row field', () => {
    const out = SmartTableComponent._interpolate('Delete {row.name}?', { name: 'tank' });
    assertEq(out, 'Delete tank?', '{row.key} pattern');
});
test('_interpolate: missing {row.key} becomes empty string', () => {
    const out = SmartTableComponent._interpolate('{row.missing}x', {});
    assertEq(out, 'x', 'missing row key → empty');
});
test('_interpolate: bare {key} substitutes from context', () => {
    const out = SmartTableComponent._interpolate('Deleted {count} items', { count: 7 });
    assertEq(out, 'Deleted 7 items', 'bare {key} pattern');
});
test('_interpolate: bare {key} keeps original when missing', () => {
    const out = SmartTableComponent._interpolate('{unknown}', { x: 1 });
    assertEq(out, '{unknown}', 'missing bare key stays literal');
});
test('_interpolate: empty template → empty', () => {
    assertEq(SmartTableComponent._interpolate('', { x: 1 }), '', 'empty template');
    assertEq(SmartTableComponent._interpolate(null, { x: 1 }), '', 'null template');
});

// ── _sortRows ────────────────────────────────────────────────────────
test('_sortRows: returns original array when no sort', () => {
    const rows = [{ a: 2 }, { a: 1 }];
    const out = SmartTableComponent._sortRows(rows, null);
    assertEq(out, rows, 'no sort → same ref');
});
test('_sortRows: ascending numeric', () => {
    const rows = [{ a: 3 }, { a: 1 }, { a: 2 }];
    const out = SmartTableComponent._sortRows(rows, { key: 'a', dir: 'asc' });
    assertEq(out.map(r => r.a), [1, 2, 3], 'numeric asc');
});
test('_sortRows: descending numeric', () => {
    const rows = [{ a: 3 }, { a: 1 }, { a: 2 }];
    const out = SmartTableComponent._sortRows(rows, { key: 'a', dir: 'desc' });
    assertEq(out.map(r => r.a), [3, 2, 1], 'numeric desc');
});
test('_sortRows: string comparison case-insensitive', () => {
    const rows = [{ a: 'banana' }, { a: 'Apple' }, { a: 'cherry' }];
    const out = SmartTableComponent._sortRows(rows, { key: 'a', dir: 'asc' });
    assertEq(out.map(r => r.a), ['Apple', 'banana', 'cherry'], 'case-insensitive sort');
});

// ── _resolveAgentId ──────────────────────────────────────────────────
test('_resolveAgentId: prefers row.agent_id', () => {
    const out = SmartTableComponent._resolveAgentId({ agent_id: 42 });
    assertEq(out, '42', 'row.agent_id wins');
});
test('_resolveAgentId: returns empty when no row + no selector', () => {
    const origMR = window.ManifestRenderer;
    window.ManifestRenderer = undefined;
    try {
        assertEq(SmartTableComponent._resolveAgentId(null), '', 'no agent → empty');
    } finally {
        window.ManifestRenderer = origMR;
    }
});
test('_resolveAgentId: falls back to page-level selector', () => {
    const origMR = window.ManifestRenderer;
    window.ManifestRenderer = { getSelectedAgentId: () => 'page-7' };
    try {
        assertEq(SmartTableComponent._resolveAgentId({}), 'page-7', 'empty row → selector');
    } finally {
        window.ManifestRenderer = origMR;
    }
});

// ── _appendAgentIdToPath ─────────────────────────────────────────────
test('_appendAgentIdToPath: appends ?agent_id', () => {
    const out = SmartTableComponent._appendAgentIdToPath('/api/pools', { agent_id: 3 });
    assertEq(out, '/api/pools?agent_id=3', 'no existing query');
});
test('_appendAgentIdToPath: appends &agent_id when query already present', () => {
    const out = SmartTableComponent._appendAgentIdToPath('/api/pools?x=1', { agent_id: 3 });
    assertEq(out, '/api/pools?x=1&agent_id=3', 'existing query uses &');
});
test('_appendAgentIdToPath: returns original when no agent', () => {
    const origMR = window.ManifestRenderer;
    window.ManifestRenderer = undefined;
    try {
        assertEq(SmartTableComponent._appendAgentIdToPath('/x', null), '/x', 'no mutation');
    } finally {
        window.ManifestRenderer = origMR;
    }
});

// ── _setNestedValue ──────────────────────────────────────────────────
test('_setNestedValue: sets flat key', () => {
    const obj = {};
    SmartTableComponent._setNestedValue(obj, 'name', 'tank');
    assertEq(obj, { name: 'tank' }, 'flat key');
});
test('_setNestedValue: sets dotted nested key', () => {
    const obj = {};
    SmartTableComponent._setNestedValue(obj, 'a.b.c', 7);
    assertEq(obj, { a: { b: { c: 7 } } }, 'dotted nested');
});
test('_setNestedValue: preserves siblings', () => {
    const obj = { a: { other: 1 } };
    SmartTableComponent._setNestedValue(obj, 'a.b', 2);
    assertEq(obj, { a: { other: 1, b: 2 } }, 'sibling preserved');
});

// ── _formatBytes ─────────────────────────────────────────────────────
test('_formatBytes: 0', () => {
    assertEq(SmartTableComponent._formatBytes(0), '0 B', 'zero bytes');
});
test('_formatBytes: 1024 → 1.0 KB', () => {
    assertEq(SmartTableComponent._formatBytes(1024), '1.0 KB', 'kilobytes');
});
test('_formatBytes: non-numeric returns "0 B"', () => {
    assertEq(SmartTableComponent._formatBytes(null), '0 B', 'null → 0 B');
});

// ── _formatDuration ──────────────────────────────────────────────────
test('_formatDuration: seconds only', () => {
    assertEq(SmartTableComponent._formatDuration(45), '45s', 'sec');
});
test('_formatDuration: minutes + seconds', () => {
    assertEq(SmartTableComponent._formatDuration(125), '2m 5s', 'min+sec');
});
test('_formatDuration: hours + minutes', () => {
    assertEq(SmartTableComponent._formatDuration(3700), '1h 1m', 'hr+min');
});
test('_formatDuration: null → empty', () => {
    assertEq(SmartTableComponent._formatDuration(null), '', 'null → empty');
});
test('_formatDuration: non-numeric stringifies', () => {
    assertEq(SmartTableComponent._formatDuration('abc'), 'abc', 'str passthrough');
});

// ── _interpolate (form namespace) ────────────────────────────────────
test('_interpolate: {form.X} resolves via form ns', () => {
    assertEq(
        SmartTableComponent._interpolate('{form.name}', { form: { name: 'backup-target' } }),
        'backup-target', '{form.X} ns');
});
test('_interpolate: {form.X} falls back to flat ctx (legacy)', () => {
    assertEq(
        SmartTableComponent._interpolate('{form.count}', { count: 3 }),
        '3', '{form.X} flat fallback');
});
test('_interpolate: {form.X} missing → empty', () => {
    assertEq(SmartTableComponent._interpolate('{form.nope}', {}), '', 'missing → empty');
});

// ── _tierVariant ─────────────────────────────────────────────────────
test('_tierVariant: red → danger',        () => assertEq(SmartTableComponent._tierVariant('red'), 'danger', 'red'));
test('_tierVariant: yellow → warning',    () => assertEq(SmartTableComponent._tierVariant('yellow'), 'warning', 'yellow'));
test('_tierVariant: black → irreversible',() => assertEq(SmartTableComponent._tierVariant('black'), 'irreversible', 'black'));
test('_tierVariant: green → primary',     () => assertEq(SmartTableComponent._tierVariant('green'), 'primary', 'green'));
test('_tierVariant: unknown → primary',   () => assertEq(SmartTableComponent._tierVariant('weird'), 'primary', 'unknown'));

// ── _isTerminalStatus ────────────────────────────────────────────────
test('_isTerminalStatus: running → false',   () => assertEq(SmartTableComponent._isTerminalStatus('running'), false, 'run'));
test('_isTerminalStatus: pending → false',   () => assertEq(SmartTableComponent._isTerminalStatus('pending'), false, 'pend'));
test('_isTerminalStatus: completed → true',  () => assertEq(SmartTableComponent._isTerminalStatus('completed'), true, 'done'));
test('_isTerminalStatus: failed → true',     () => assertEq(SmartTableComponent._isTerminalStatus('failed'), true, 'fail'));
test('_isTerminalStatus: cancelled → true',  () => assertEq(SmartTableComponent._isTerminalStatus('cancelled'), true, 'cancel'));
test('_isTerminalStatus: case-insensitive',  () => assertEq(SmartTableComponent._isTerminalStatus('COMPLETED'), true, 'upper'));

// ── _getNestedValue ──────────────────────────────────────────────────
test('_getNestedValue: flat key', () => {
    assertEq(SmartTableComponent._getNestedValue({ public_key: 'ssh-ed25519 AAA...' }, 'public_key'),
        'ssh-ed25519 AAA...', 'flat');
});
test('_getNestedValue: dotted path', () => {
    assertEq(SmartTableComponent._getNestedValue({ result: { key: 'abc' } }, 'result.key'), 'abc', 'dotted');
});
test('_getNestedValue: missing returns undefined', () => {
    assertEq(SmartTableComponent._getNestedValue({ a: 1 }, 'a.b'), undefined, 'missing');
});

// ── _describeCron ────────────────────────────────────────────────────
test('_describeCron: empty is invalid',          () => assertEq(SmartTableComponent._describeCron(''), 'Invalid — enter 5 space-separated fields', 'empty'));
test('_describeCron: every 15 minutes',          () => assertEq(SmartTableComponent._describeCron('*/15 * * * *'), 'Runs every 15 minutes, every day.', 'every15'));
test('_describeCron: midnight daily',            () => assertEq(SmartTableComponent._describeCron('0 0 * * *'), 'Runs at 00:00, every day.', 'midnight'));
test('_describeCron: Sunday at 02:00',           () => assertEq(SmartTableComponent._describeCron('0 2 * * 0'), 'Runs at 02:00, every Sun.', 'sun'));
test('_describeCron: multi-day list',            () => assertEq(SmartTableComponent._describeCron('30 3 * * 1,3,5'), 'Runs at 03:30, on Mon, Wed, Fri.', 'mwf'));
test('_describeCron: bogus chars fail',          () => {
    const d = SmartTableComponent._describeCron('a b c d e');
    if (!d.startsWith('Invalid')) throw new Error('expected Invalid, got ' + d);
});
test('_describeCron: wrong field count fails',   () => {
    const d = SmartTableComponent._describeCron('* * *');
    if (!d.startsWith('Invalid')) throw new Error('expected Invalid, got ' + d);
});

// ── _renderField snapshots (DOM-enabled here) ────────────────────────
// The browser harness can exercise DOM-emitting renderers that the Node
// runner cannot. These are loose "does it contain the right markers"
// checks, not full innerHTML diffs — whitespace churn shouldn't break tests.
test('_renderField: test_button emits button with endpoint + require fields', () => {
    const html = SmartTableComponent._renderField({
        key: 'test_connection', type: 'test_button',
        button_label: 'Test Connection', endpoint: '/api/replication/test-connection',
        require_fields: ['dest_host', 'dest_user']
    }, null);
    assert(html.includes('smart-test-button'), 'has test-button class');
    assert(html.includes('data-endpoint="/api/replication/test-connection"'), 'endpoint attr');
    assert(html.includes('data-require-fields="dest_host,dest_user"'), 'require-fields joined');
    assert(html.includes('_runTestButton'), 'onclick wired');
});
test('_renderField: cron emits monospace input + preview', () => {
    const html = SmartTableComponent._renderField({
        key: 'schedule', type: 'cron', label: 'Schedule'
    }, null);
    assert(html.includes('smart-cron-input'), 'cron input class');
    assert(html.includes('data-cron-preview-for="schedule"'), 'preview target');
});
test('_renderField: select + allow_custom + custom_input_type:cron routes sibling through cron input', () => {
    const html = SmartTableComponent._renderField({
        key: 'schedule', type: 'select', label: 'Schedule',
        options: [{ value: '0 0 * * *', label: 'Daily' }],
        allow_custom: true,
        custom_label: 'Custom (cron expression)',
        custom_input_type: 'cron'
    }, null);
    assert(html.includes('smart-custom-input-group'), 'custom wrap present');
    assert(html.includes('smart-custom-input smart-cron-input'), 'custom input is a cron input');
    assert(html.includes('data-cron-preview-for="schedule"'), 'live preview element wired');
    assert(html.includes('data-custom-for="schedule"'), 'sibling substitution still works');
    // Sanity: a plain allow_custom field (no cron) should NOT emit cron markup.
    const html2 = SmartTableComponent._renderField({
        key: 'retention', type: 'select', label: 'Retention',
        options: [{ value: 7, label: 'Keep 7' }],
        allow_custom: true,
        custom_label: 'Custom count'
    }, null);
    assert(!html2.includes('smart-cron-input'), 'plain custom does not render cron');
    assert(!html2.includes('smart-cron-preview'), 'plain custom omits preview');
});
test('_renderField: remote_value emits textarea + copy button', () => {
    const html = SmartTableComponent._renderField({
        key: 'ssh_public_key', type: 'remote_value',
        depends_on: 'ssh_key_name',
        endpoint: '/api/replication/keys/{form.ssh_key_name}/public',
        value_path: 'public_key'
    }, null);
    assert(html.includes('smart-remote-value-display'), 'display element');
    assert(html.includes('data-remote-field="ssh_public_key"'), 'wrap key attr');
    assert(html.includes('data-depends-on="ssh_key_name"'), 'depends_on attr');
    assert(html.includes('data-value-path="public_key"'), 'value_path attr');
    assert(html.includes('smart-remote-value-copy'), 'copy button present');
});
test('_renderField: remote_value with copy_button=false hides button', () => {
    const html = SmartTableComponent._renderField({
        key: 'ro', type: 'remote_value',
        depends_on: 'x', endpoint: '/api/x', copy_button: false
    }, null);
    assert(!html.includes('smart-remote-value-copy'), 'copy button absent');
});

// ── _formatValue (format dispatch) ───────────────────────────────────
test('_formatValue: error_count OK class when zero', () => {
    const html = SmartTableComponent._formatValue(0, 'error_count', {}, { key: 'read' });
    assert(html.includes('smart-error-count-ok'), 'ok class');
});
test('_formatValue: error_count bad class when nonzero', () => {
    const html = SmartTableComponent._formatValue(3, 'error_count', {}, { key: 'read' });
    assert(html.includes('smart-error-count-bad'), 'bad class');
    assert(html.includes('>3<'), 'value rendered');
});

// ── Render results ───────────────────────────────────────────────────
const container = document.getElementById('results');
const summaryEl = document.getElementById('summary');
let pass = 0, fail = 0;
for (const r of results) {
    const div = document.createElement('div');
    div.className = 'case ' + (r.ok ? 'pass' : 'fail');
    div.textContent = (r.ok ? '✓ ' : '✗ ') + r.name + (r.err ? '\n  ' + r.err : '');
    container.appendChild(div);
    if (r.ok) pass++; else fail++;
}
summaryEl.textContent = `${pass} passed, ${fail} failed (${results.length} total)`;
summaryEl.style.color = fail === 0 ? '#10b981' : '#ef4444';
console.log(`smart-table tests: ${pass} passed, ${fail} failed`);
if (fail > 0) console.error(results.filter(r => !r.ok));
</script>
</body>
</html>
